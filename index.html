<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#eef1f6;--surface:#ffffff;--card:#ffffff;--card2:#f4f6f9;
  --border:#d4dae6;--border2:#b8c2d4;
  --accent:#c26a00;--accent-dim:#a85a00;--green:#15803d;--red:#c41e1e;--blue:#1565c0;
  --muted:#64748b;--sub:#475569;--text:#0f172a;
  --cafe-bg:#e3efff;--cafe-fg:#1e3a8a;--store-bg:#dcfce7;--store-fg:#166534;
  --link-email-bg:#dbeafe;--link-email-fg:#0c4a6e;--link-email-border:#2563eb;
  --link-web-bg:#d1fae5;--link-web-fg:#065f46;--link-web-border:#059669;
  --link-fb-bg:#e7f3ff;--link-fb-fg:#084298;--link-fb-border:#1877f2;
  --r:14px;--tap:48px;
  --font:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono","Courier New",monospace;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 80px)}
#hdr{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px}
#hdr h1{font-size:1.1rem;font-weight:800;color:#b45309;letter-spacing:-.02em}
#hdr-sub{font-size:.65rem;color:var(--muted);margin-top:1px;margin-bottom:10px}
#hdr-btns{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#hdr-btns::-webkit-scrollbar{display:none}
.hbtn{flex-shrink:0;height:36px;padding:0 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--sub);font-family:var(--font);font-size:.74rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.hbtn:active{opacity:.7}
.hbtn.active{background:#fff7ed;border-color:var(--accent);color:var(--accent)}
.hbtn.danger{color:var(--red)}
#stats-bar{display:flex;gap:6px;padding:9px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--bg)}
#stats-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-size:.7rem;color:var(--sub);white-space:nowrap}
.chip em{font-style:normal;font-weight:700;color:var(--accent)}
.chip.g em{color:var(--green)}.chip.r em{color:var(--red)}
#tplPanel{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease}
#tplPanel.open{max-height:420px}
#tplInner{padding:16px}
#tplInner h3{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:12px}
.tpl-lbl{font-size:.68rem;color:var(--muted);font-weight:600;display:block;margin-bottom:4px}
.tpl-inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.82rem;padding:8px 11px;resize:none;outline:none;margin-bottom:10px}
.tpl-inp:focus{border-color:var(--accent)}
.tpl-btns{display:flex;gap:8px;align-items:center}
.btn-save{background:var(--accent);color:#fff;border:none;padding:0 18px;height:var(--tap);border-radius:10px;font-family:var(--font);font-size:.8rem;font-weight:700;cursor:pointer}
.btn-clear{background:none;border:1px solid var(--border2);color:var(--muted);padding:0 14px;height:var(--tap);border-radius:10px;font-family:var(--font);font-size:.78rem;cursor:pointer}
#tplFlash{font-size:.72rem;color:var(--green);display:none}
#venue-toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 72px);transform:translateX(-50%) translateY(120%);z-index:400;max-width:min(92vw,360px);padding:10px 14px;background:rgba(15,23,42,.92);color:#f8fafc;font-size:.78rem;line-height:1.35;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);opacity:0;transition:opacity .25s ease,transform .35s ease;pointer-events:none;text-align:center}
#venue-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#idx{padding:10px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
#idx-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:8px}
#idx-links{display:flex;flex-wrap:wrap;gap:6px}
.ibtn{padding:0 12px;height:34px;border-radius:17px;background:var(--card);border:1px solid var(--border2);color:var(--sub);font-family:var(--font);font-size:.71rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center}
.ibtn:active{opacity:.7}
.ibtn.done{background:#ecfdf5;border-color:var(--green);color:var(--green)}
.ibtn.partial{background:#fffbeb;border-color:var(--accent-dim);color:var(--accent)}
.city-sec{border-bottom:3px solid var(--bg)}
.city-top{padding:18px 16px 0;display:flex;align-items:flex-start;gap:10px}
.city-name{font-size:1rem;font-weight:800;letter-spacing:-.02em;flex:1;line-height:1.2}
.city-cnt{font-size:.67rem;color:var(--muted);padding-top:4px;white-space:nowrap}
.city-tags{display:flex;flex-wrap:wrap;gap:5px;padding:8px 16px 12px}
.tag{font-size:.6rem;padding:2px 9px;border-radius:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.tag-major{background:#ffedd5;color:#9a3412}.tag-college{background:#d1fae5;color:#047857}.tag-conv{background:#fef3c7;color:#b45309}
.prog-wrap{height:3px;background:var(--bg);margin:0 16px 16px;border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#f7c96e);border-radius:3px;transition:width .4s}
.sub-lbl{font-size:.63rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;padding:4px 16px 6px;display:flex;align-items:center;gap:8px}
.sub-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.vc{margin:0 12px 12px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);overflow:hidden;transition:border-color .2s,opacity .2s}
.vc.is-done{border-color:#86efac}.vc.is-skip{border-color:#fecaca;opacity:.75}
.vc-top{padding:11px 14px 10px;background:var(--card2);display:flex;align-items:flex-start;gap:8px}
.vc-name{font-weight:700;font-size:.87rem;flex:1;line-height:1.3;color:var(--text);min-width:0}
.vc-sub{font-size:.69rem;color:var(--sub);margin-top:2px;font-weight:400;line-height:1.35}
.vc-pill{flex-shrink:0;font-size:.6rem;padding:3px 9px;border-radius:10px;font-weight:700;margin-top:2px;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase}
.pill-cafe{background:var(--cafe-bg);color:var(--cafe-fg)}.pill-store{background:var(--store-bg);color:var(--store-fg)}
.vc.is-done .vc-top{background:#ecfdf5}.vc.is-skip .vc-top{background:#fef2f2}
.vc-rows{padding:0 14px 6px;display:flex;flex-direction:column}
.crow{display:flex;flex-direction:column;border-bottom:1px solid var(--border)}
.crow:last-child{border-bottom:none}
.crow-main{display:flex;align-items:center;gap:9px;min-height:var(--tap);padding:2px 0}
.crow-chk{width:22px;height:22px;flex-shrink:0;border:2px solid var(--border2);border-radius:6px;background:var(--bg);-webkit-appearance:none;appearance:none;cursor:pointer;position:relative;transition:background .12s,border-color .12s}
.crow-chk-spacer{width:22px;height:22px;flex-shrink:0}
.crow-chk:checked{background:var(--accent);border-color:var(--accent)}
.crow-chk:checked::after{content:'v';position:absolute;top:-1px;left:3px;font-size:13px;font-weight:800;color:#fff}
.skip-chk:checked{background:var(--red);border-color:var(--red)}
.crow-lbl{font-size:.69rem;color:var(--muted);width:58px;flex-shrink:0;font-weight:600;line-height:1.2}
.skip-row .crow-lbl{color:var(--red)}
.crow-val{flex:1;font-size:.79rem;color:var(--sub);overflow:hidden;min-width:0}
.crow-val a:not(.crow-link){color:var(--blue);text-decoration:underline;text-underline-offset:2px}
.crow-val-link{flex:1;min-width:0;align-self:stretch;display:flex;align-items:center}
.crow-val-link .crow-link{display:block;width:100%;font-size:1.15rem;font-weight:800;line-height:1.25;padding:14px 16px;border-radius:12px;border:3px solid;text-decoration:none;word-break:break-all;text-align:center;min-height:52px;box-sizing:border-box;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,.12)}
.crow-link-email{background:var(--link-email-bg);color:var(--link-email-fg);border-color:var(--link-email-border)}
.crow-link-website{background:var(--link-web-bg);color:var(--link-web-fg);border-color:var(--link-web-border)}
.crow-link-facebook{background:var(--link-fb-bg);color:var(--link-fb-fg);border-color:var(--link-fb-border)}
.crow-val-link .crow-link.crow-link-visited{font-size:.79rem;font-weight:600;line-height:1.35;padding:2px 0;border:none;border-radius:0;min-height:0;text-align:left;background:transparent!important;color:var(--blue)!important;text-decoration:underline;text-underline-offset:3px;-webkit-tap-highlight-color:transparent}
.crow-val.na{color:var(--muted);font-style:italic;font-size:.73rem}
.crow-date{font-size:.62rem;color:var(--accent);white-space:nowrap;flex-shrink:0;font-family:var(--mono)}
.crow-date.skip-dt{color:var(--red)}
.crow-note{display:none;margin-left:31px;padding:0 0 8px;gap:6px;align-items:flex-start}
.crow-note.open{display:flex}
.note-dt{font-size:.61rem;color:var(--muted);white-space:nowrap;padding-top:6px;font-family:var(--mono)}
.note-ta{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--font);font-size:.75rem;padding:6px 9px;resize:none;height:34px;outline:none}
.note-ta:focus{border-color:var(--accent)}
.eadd-wrap{display:none;margin-left:31px;padding:4px 0 10px;gap:6px;align-items:center}
.eadd-wrap.open{display:flex}
.eadd-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:.75rem;padding:7px 9px;outline:none;height:36px;min-width:0}
.eadd-inp:focus{border-color:var(--accent)}
.eadd-btn{flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:0 13px;height:36px;font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer}
.add-email-btn{flex-shrink:0;background:none;border:1px solid var(--border2);color:var(--muted);border-radius:6px;width:28px;height:28px;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);right:16px;z-index:300}
#fab-next{background:var(--accent);color:#fff;border:none;border-radius:28px;padding:0 20px;height:52px;font-family:var(--font);font-size:.85rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 18px rgba(194,106,0,.35)}
#fab-next:active{opacity:.85}
#all-done{display:none;flex-direction:column;align-items:center;padding:60px 32px;text-align:center;gap:12px}
#all-done.show{display:flex}
#all-done .big{font-size:3rem}
#all-done h2{font-size:1.1rem;font-weight:800;color:var(--green)}
#all-done p{font-size:.82rem;color:var(--sub);line-height:1.6}
</style>
</head>

<div id="hdr">
  <h1>&#127922; Board Game Venues</h1>
  <div id="hdr-sub">Mobile outreach tracker</div>
  <div id="hdr-btns">
    <button class="hbtn" id="citySet3Btn" type="button" onclick="switchCitySet('3')">City set three</button>
    <button class="hbtn active" id="citySet1Btn" type="button" onclick="switchCitySet('1')">City set one</button>
    <button class="hbtn" id="citySet2Btn" type="button" onclick="switchCitySet('2')">City set two</button>
    <button class="hbtn" id="tplToggle" onclick="toggleTpl()">&#9993; Template</button>
    <button class="hbtn" id="saveBtn" onclick="downloadHTML()">&#10003; Save progress</button>
    <button class="hbtn danger" onclick="resetAll()">&#8635; Reset</button>
    <button class="hbtn danger" onclick="clearStoredState()">&#128465; Clear storage</button>
  </div>
</div>
<div id="stats-bar">
  <div class="chip" id="s-total"><em>0</em> venues</div>

  <div class="chip r" id="s-skip"><em>0</em> skipped</div>
  <div class="chip" id="s-left"><em>0</em> remaining</div>
</div>
<div id="tplPanel">
  <div id="tplInner">
    <h3>Gmail Compose Template</h3>
    <label class="tpl-lbl">Subject</label>
    <input type="text" class="tpl-inp" id="tplSub" placeholder="e.g. Partnership opportunity - MeepleUp">
    <label class="tpl-lbl">Body</label>
    <textarea class="tpl-inp" id="tplBody" rows="5" placeholder="Hi [Name],&#10;&#10;I wanted to reach out about...&#10;&#10;Best,&#10;[Your name]"></textarea>
    <div class="tpl-btns">
      <button class="btn-save" onclick="saveTpl()">Save</button>
      <button class="btn-clear" onclick="clearTpl()">Clear</button>
      <span id="tplFlash">Saved!</span>
    </div>
  </div>
</div>
<div id="idx">
  <div id="idx-lbl">Jump to City</div>
  <div id="idx-links"></div>
</div>
<div id="container"></div>
<div id="all-done">
  <div class="big">&#127881;</div>
  <h2>All venues handled!</h2>
  <p>Every venue has been contacted or skipped.</p>
</div>
<div id="fab">
  <button id="fab-next" onclick="scrollToNext()">&#8250; Next venue</button>
</div>
<div id="venue-toast" role="status" aria-live="polite"></div>

var DEFAULT_SUBJECT="Introducing MeepleUp - Free App for Tabletop Gaming Groups";
var DEFAULT_BODY="Hi,\n\nI'm an indie developer who just launched MeepleUp, a free app that helps tabletop gaming groups coordinate. It handles RSVPs, owned game title browsing and voting, and event messaging all in one place.\n\nGaming groups that you host will probably like it. Please visit https://meepleup.com to learn more, or just dive right in and download \"MeepleUp\" on the App Store or Google Play.\n\nThank you so much for any feedback you can provide. I've spent over a thousand hours building this app. It would mean so much to me to get it in the hands of people who might appreciate it.\n\nSincerely,\nRhys Smoker";

var VENUE_MESSAGES_SET_ONE={
  gamehaven:{body:"Hey Game Haven team, hope things are going great at the Sandy shop!\n\nI'm Rhys, an indie dev (and a total board game nerd) who just launched a free app called MeepleUp. I noticed you guys have that awesome 'Battle Grounds' coffee setup and private rooms—it's exactly the kind of space I had in mind when I started coding this.\n\nI built the app to take the headache out of organizing game nights—handling RSVPs, voting on what to play, and messaging all in one spot. It also has a cataloging tool that lets your regulars browse your library from their phones while they grab a latte. If you have a second to check out https://meepleup.com, I'd love to hear what your crew thinks.\n\nCheers, Rhys"},
  legendarium:{body:"Hi Legendarium team, I'm a huge fan of the fantasy-focused bookstore and cafe vibe you've built in SLC!\n\nI'm a solo developer who just released MeepleUp, a free app designed to help tabletop groups plan their sessions. Since your space is so community-oriented, I thought your RPG and literary gaming groups might appreciate a dedicated tool for event messaging and RSVPs that isn't as cluttered as a standard chat app.\n\nI've put a ton of 'sweat equity' into this as a passion project. If you have a minute to look at https://meepleup.com, I'd value any feedback from a unique venue like yours.\n\nBest, Rhys Smoker"},
  gamenightgames:{body:"Hi Game Night Games team, hope the Sugar House crowd is keeping you busy today!\n\nI'm an indie dev reaching out because I've just finished a project called MeepleUp. It's a free app that simplifies the 'admin' side of tabletop gaming—RSVPs, scheduling, and player-matching.\n\nI know you guys are a staple for the local scene. I've spent over a thousand hours building this as a labor of love, and I think it would be a great resource for the folks who frequent your Open Gaming nights. Feel free to check it out at https://meepleup.com.\n\nSincerely, Rhys"},
  oasisgames:{body:"Hey Oasis Games team, hope the TCG and board game tables are full this week!\n\nI'm Rhys, a developer who just launched a free coordination app for tabletop groups called MeepleUp. I know you guys have a massive dedicated play space, and I built this specifically to help players coordinate those kinds of meetups and handle their group chats without the mess of a million Discord notifications.\n\nIt's a project I've been building for a long time as a solo dev. If you want to take a look, it's at https://meepleup.com. Thanks for all the hard work you do for the SLC hobby!\n\nBest, Rhys Smoker"},
  hasturgames:{body:"Hello Hastur Games team, I hope all is well in the shop!\n\nI wanted to reach out because I've just launched an app called MeepleUp that I think your board game community would really enjoy. It's a free tool that helps groups schedule their sessions and message each other without the clutter of a general chat app or social media.\n\nI've spent well over a thousand hours on this project, so any feedback from a veteran shop like yours would mean a lot. You can find us at https://meepleup.com.\n\nThanks, Rhys"},
  saltcitygames:{body:"Hi Salt City Games, hope you're having a busy week!\n\nI'm an indie developer who just released MeepleUp, a free mobile app for tabletop coordination. It handles everything from RSVP management to remote library browsing. I think the folks who attend your regular open play events would really appreciate a dedicated interface for staying connected between games.\n\nI'm just a solo dev trying to build something useful for the hobby we all love. If you have a second to check out the landing page at https://meepleup.com, I'd love to know what you think.\n\nBest, Rhys Smoker"},
  paragoncitygames:{body:"Hey Paragon City team, hope the shop is doing great today!\n\nI'm an indie dev who just launched MeepleUp, which is a free app for game night coordination. I saw you guys have a solid local following, and I thought your regulars might appreciate a better way to plan their sessions and manage their group RSVPs in one spot.\n\nI've put a lot of heart into this as a passion project. If you have a minute to check out https://meepleup.com, I'd love to hear your thoughts.\n\nCheers, Rhys"},
  riftgategames:{body:"Hi Riftgate team, hope things are going great at the shop!\n\nI'm Rhys, an indie dev who just finished building a free app called MeepleUp. I wanted to reach out because I'm trying to get this into the hands of shops that really care about the community side of gaming.\n\nThe app is built to handle the logistics—RSVPs, voting on what to play, and messaging—all in one spot. I'm just an indie developer trying to help groups spend less time on their phones and more time actually playing. Check us out at https://meepleup.com.\n\nSincerely, Rhys Smoker"},
  mindgames:{body:"Hello Mind Games team! Hope you're having a great week in the shop.\n\nI'm an indie developer and I recently launched MeepleUp, a free app for tabletop coordination. It's designed to handle RSVPs, game voting, and messaging all in one dedicated space.\n\nI know you have a dedicated local crowd, and I'm just trying to get this out to people who love the hobby as much as I do. If you have a second to check out the landing page at https://meepleup.com, I'd love to hear your take.\n\nThanks, Rhys"},
  paladinsleague:{body:"Hi Paladins League team, hope the gaming is going strong today!\n\nI'm Rhys, a solo indie dev and a fellow board gamer. I wanted to reach out because I've just launched a free app called MeepleUp that I think would fit perfectly with your league-focused community.\n\nIt handles the 'logistics' of game night—RSVPs, voting on titles, and messaging—all in one place. It's built to help those regular groups stay organized without the headache of messy text threads. I've put a ton of 'sweat equity' into this, so if you have a minute to check it out at https://meepleup.com, I'd really value your feedback.\n\nCheers, Rhys"},
  battlegroundspdx:{body:"Hey Battle Grounds team, hope the cafe is staying busy this week!\n\nI'm Rhys, a developer (and a bit of a nerd) who just launched a free app called MeepleUp. I love the hybrid cafe model you guys have built in Portland—it's exactly the kind of space I was thinking of when I built the remote library browsing feature for this app.\n\nIt lets groups vote on games and handle their RSVPs before they even show up for their first round of drinks. I've been working on this for over a thousand hours as a solo project. If you want to take a look, it's at https://meepleup.com.\n\nThanks for all you do for the PDX scene!\n\nBest, Rhys Smoker"},
  empirebgl:{body:"Greetings from the empire's outer reaches.\n\nWould you be willing to give MeepleUp a try? It's a free app I built for groups that game together regularly — members RSVP between sessions, nominate games from a shared library, and vote, so they arrive knowing what they're playing and your staff can focus on teaching rather than helping the group decide. Your collection is already catalogued on BoardGameGeek, which means getting it into the app would take almost no time at all.\n\nI've spent over a thousand hours on this and I'm in early release. If anything feels off, please email contact@meepleup.com before leaving a review — I'd much rather fix it first. If it works well, a rating on the App Store or Google Play would be a real help.\n\nmeepleup.com or search \"MeepleUp\" on the App Store / Google Play.\n\nThanks,\nRhys Smoker"},
  "sliceanddice-w":{body:"Hi Slice and Dice team, I love the 'Dine-in and Play' concept you've built in ABQ!\n\nI'm the developer of a new, free app called MeepleUp that helps gaming groups coordinate their sessions. Since you guys have such a unique hybrid of great food and gaming, I thought your customers would appreciate a tool that lets them RSVP for a table and vote on which game to play while they wait for their pizza.\n\nIt's a labor of love I've been building for a long time now. If you have a moment, take a look at https://meepleup.com—it might be a great resource for the folks at your open gaming nights.\n\nBest, Rhys Smoker"},
  "sliceanddice-e":{body:"Hi Slice and Dice team, I love the 'Dine-in and Play' concept you've built in ABQ!\n\nI'm the developer of a new, free app called MeepleUp that helps gaming groups coordinate their sessions. Since you guys have such a unique hybrid of great food and gaming, I thought your customers would appreciate a tool that lets them RSVP for a table and vote on which game to play while they wait for their pizza.\n\nIt's a labor of love I've been building for a long time now. If you have a moment, take a look at https://meepleup.com—it might be a great resource for the folks at your open gaming nights.\n\nBest, Rhys Smoker"},
  ettingames:{body:"Hi Ettin Games, hope the Albuquerque tabletop scene is thriving!\n\nI'm an indie dev who recently finished building MeepleUp, a free app designed to help local gaming communities stay organized. I noticed you guys have a really active Discord and a massive space for RPGs and minis—MeepleUp helps those kinds of groups manage their RSVPs and discussion boards in a dedicated space rather than a cluttered chat thread.\n\nI've spent over a thousand hours on this project and would love to see it helping your local league players find each other. You can see the details at https://meepleup.com. Thanks for all the hard work you do for the hobby!\n\nSincerely, Rhys Smoker"},
  oldtownhobby:{body:"Hello Old Town Hobbies! I hope all is well in the shop today.\n\nI wanted to reach out because I've just launched an app called MeepleUp that I think your board game community would really enjoy. It's a free tool that helps groups schedule their sessions, vote on titles, and message each other in one place.\n\nFor a community-focused shop like yours, it's a great way for players to stay engaged between visits. Feel free to check out the landing page at https://meepleup.com or download it on Google Play/App Store. I'm an indie developer just trying to get this into the hands of people who love the hobby as much as I do.\n\nThanks, Rhys Smoker"},
  "dukecitygames-l":{body:"Hey Duke City Games team, hope the TCG and board game events are going strong!\n\nI'm an indie developer reaching out because I just went live with MeepleUp, a free app built to take the headache out of organizing game nights. Since you guys host so many events across your locations, I thought your regulars might like a dedicated spot for RSVPs and player-matching.\n\nIt also has a cool feature where users can browse game libraries remotely. Check us out at https://meepleup.com—I've put a massive amount of time into this and would value any feedback from a veteran shop like yours.\n\nBest, Rhys Smoker"},
  "dukecitygames-h":{body:"Hey Duke City Games team, hope the TCG and board game events are going strong!\n\nI'm an indie developer reaching out because I just went live with MeepleUp, a free app built to take the headache out of organizing game nights. Since you guys host so many events across your locations, I thought your regulars might like a dedicated spot for RSVPs and player-matching.\n\nIt also has a cool feature where users can browse game libraries remotely. Check us out at https://meepleup.com—I've put a massive amount of time into this and would value any feedback from a veteran shop like yours.\n\nBest, Rhys Smoker"},
  spielbound:{body:"Hi there, hope you're all still bound to play.\n\nI'm writing to ask if you'd try MeepleUp with your regulars. It's a free app I built for groups that game together regularly — members RSVP between sessions, nominate games from a shared library, and vote, so they show up knowing what they're playing instead of browsing after they sit down. With a collection your size, the fastest path is probably syncing straight from BoardGameGeek if Spielbound is already listed there — if not, AI photo recognition can read the shelves.\n\nI've spent over a thousand hours on this and I'm in early release. If anything feels off, please email contact@meepleup.com before leaving a review — I want to get this right. If it works well, a rating on either app store would mean a lot.\n\nmeepleup.com or search \"MeepleUp\" on the App Store / Google Play.\n\nThanks,\nRhys Smoker"},
  geekroom:{body:"Hi Geek Room! Hope you're having a great week in the shop.\n\nI'm an indie dev who just launched MeepleUp, a free app for tabletop gamers. It's designed to handle everything from RSVP management to game-title voting in one place. I know you guys have a dedicated local following, and I think the groups who use your tables would find this way easier than juggling text threads.\n\nYou can find more info at https://meepleup.com. I've put a lot of heart into this project and would love to see it helping local players connect at your store.\n\nBest, Rhys Smoker"},

  unpluggedrva:{body:"Hi there, hope everyone's nicely unplugged out in Midlothian.\n\nWould you give MeepleUp a try with your Board Game Social crowd? It's a free app I built for groups that game together regularly — members RSVP between sessions, nominate games from a shared library, and vote — so they arrive knowing what they're playing instead of figuring it out after they sit down. If Unplugged Games Cafe is on BoardGameGeek the library syncs in one shot — or AI photo recognition can read the shelves directly.\n\nI've spent over a thousand hours on this and I'm in early release, so there are almost certainly bugs I haven't found yet. If anything feels off, please email contact@meepleup.com before leaving a review — I'd much rather fix it. If it works well, a rating on the App Store or Google Play would mean a lot.\n\nmeepleup.com or search \"MeepleUp\" on the App Store / Google Play.\n\nThanks,\nRhys Smoker"},

  shortresttavern:{body:"Hope you're all rested — or at least short-rested.\n\nI'm writing to ask if you'd give MeepleUp a try with your regulars. It's a free app I built for groups that game together regularly — members RSVP between sessions, nominate games from a shared library, and vote, so they show up knowing what they're playing instead of working it out after they sit down. If Short Rest Tavern is on BoardGameGeek the library comes in fast — or AI can read your shelves from photos.\n\nI've spent over a thousand hours on this and I'm in early release. If anything doesn't work right, please email contact@meepleup.com before leaving a review — I'd rather fix it. If it works well, a rating on the App Store or Google Play would genuinely help.\n\nmeepleup.com or search \"MeepleUp\" on the App Store / Google Play.\n\nThanks,\nRhys Smoker"},

  meeplemadness:{body:"Hi Meeple Madness team—I couldn't resist reaching out given the name!\n\nI'm the developer of MeepleUp, a free app built to help groups organize their gaming sessions. I saw that you focus heavily on being a welcoming space for all types of players, and I think your community would love a tool that handles RSVPs and game-voting in one spot.\n\nIt also features an AI-powered cataloger to help families and groups browse your collection from home. I've put a massive amount of time into this project—please check it out at https://meepleup.com.\n\nSincerely, Rhys Smoker"},

  tabletopgamecafe:{body:"Hi Tabletop Game Cafe team, hope the shop is having a busy week!\n\nI'm Rhys, a solo dev and a fellow board gamer. I wanted to reach out because I've spent the better part of the last year building a free app called MeepleUp. I really love the neighborhood vibe you guys have built—it's exactly the kind of community I had in mind when I started this.\n\nThe app is built to handle the 'logistics' of game night—RSVPs, voting on what to play, and a way for people to browse your 600+ game library from their phones before they even sit down. I'm just an indie developer trying to help groups spend less time staring at a shelf and more time actually playing.\n\nIf you have a minute, check us out at https://meepleup.com. I'd love to know what a staple shop like yours thinks of it.\n\nCheers, Rhys"},
  forgetavern:{body:"Hey Forge Tavern team, hope things are going great in the Great Hall today!\n\nI'm a developer (and a massive nerd) who just launched a free app called MeepleUp. I've been following the themed events you guys put on—the Wizarding dinners and trivia nights look awesome—and I thought my app might actually be a handy tool for your regulars.\n\nIt's built for tabletop groups to coordinate their nights, manage RSVPs, and handle group chats in one spot. Since your events are so immersive, I thought your crowd would appreciate a dedicated space to plan their next 'adventure' at the tavern.\n\nI've put over a thousand hours of sweat equity into this project. If you're curious, you can see it at https://meepleup.com.\n\nThanks for all you do for the Columbus scene!\n\nSincerely, Rhys Smoker"},
  "guardtower-west":{body:"Hi Guardtower team, hope the tables are full at both the West and East shops today!\n\nI'm an indie dev who just released a free app called MeepleUp. I'm reaching out because I know you guys are the heavyweights of the Columbus scene—especially with that terrain library and the massive play spaces you provide.\n\nI built this app to help groups stay organized without the mess of a million Discord notifications. It handles RSVPs and even lets players browse libraries remotely. I've put a lot of heart (and a thousand hours of coding) into this as a solo dev, and I'm just trying to get it into the hands of people who really live and breathe the hobby.\n\nYou can find us at https://meepleup.com. Would love to hear if your community finds it useful!\n\nBest, Rhys"},
  "guardtower-east":{body:"Hi Guardtower team, hope the tables are full at both the West and East shops today!\n\nI'm an indie dev who just released a free app called MeepleUp. I'm reaching out because I know you guys are the heavyweights of the Columbus scene—especially with that terrain library and the massive play spaces you provide.\n\nI built this app to help groups stay organized without the mess of a million Discord notifications. It handles RSVPs and even lets players browse libraries remotely. I've put a lot of heart (and a thousand hours of coding) into this as a solo dev, and I'm just trying to get it into the hands of people who really live and breathe the hobby.\n\nYou can find us at https://meepleup.com. Would love to hear if your community finds it useful!\n\nBest, Rhys"},
  beyondtheboard:{body:"Hello Beyond the Board team! Hope you're having a great week up in Dublin.\n\nI'm an indie developer who recently launched MeepleUp, which is a free app for game night coordination. I saw you guys have a great demo library and a really community-focused shop, and I thought your regulars might appreciate a better way to plan their sessions.\n\nIt's designed to handle RSVPs, game voting, and event messaging all in one dedicated space. I'm just a solo dev trying to build something useful for the hobby we all love. If you have a second to check out the landing page at https://meepleup.com, I'd love to know what you think.\n\nThanks for your time!\n\nCheers, Rhys Smoker"},
  soldierygames:{body:"Hi Soldiery team, hope all is well in the shop today!\n\nI'm an indie developer reaching out because I've just finished a project called MeepleUp. It's a free app that simplifies the 'admin' side of tabletop gaming—RSVPs, scheduling, and player-matching.\n\nI know you guys have been a pillar of the local scene for a long time. I've spent over a thousand hours building this as a labor of love, and I'm just trying to get it out to communities that really value the social side of gaming.\n\nFeel free to check it out at https://meepleup.com. Any feedback from a veteran shop like yours would mean the world to me.\n\nSincerely, Rhys"},
  "cardboardcorner-op":{body:"Hey Cardboard Corner team, I hope the waffle irons are hot and the tables are full today!\n\nI'm Rhys, a solo indie dev and a huge board game fan. I wanted to reach out because I've been building a free app called MeepleUp for the last year or so. I love how you guys have built a space that feels so welcoming for 'Learn to Play' nights and RPGs.\n\nI built this app to handle the 'coordination headache'—RSVPs, voting on what to play, and messaging—all in one spot. It also has a cataloging tool that would let your regulars browse your 800+ games from their phones while they're waiting for their Loaded Baked Potato waffles.\n\nI've put a ton of sweat equity into this as a passion project. If you have a minute to check it out at https://meepleup.com, I'd love to hear what your community thinks.\n\nCheers, Rhys"},
  "cardboardcorner-lenexa":{body:"Hey Cardboard Corner team, I hope the waffle irons are hot and the tables are full today!\n\nI'm Rhys, a solo indie dev and a huge board game fan. I wanted to reach out because I've been building a free app called MeepleUp for the last year or so. I love how you guys have built a space that feels so welcoming for 'Learn to Play' nights and RPGs.\n\nI built this app to handle the 'coordination headache'—RSVPs, voting on what to play, and messaging—all in one spot. It also has a cataloging tool that would let your regulars browse your 800+ games from their phones while they're waiting for their Loaded Baked Potato waffles.\n\nI've put a ton of sweat equity into this as a passion project. If you have a minute to check it out at https://meepleup.com, I'd love to hear what your community thinks.\n\nCheers, Rhys"},
  pawnandpint:{body:"Hi Pawn & Pint team, hope the tavern is having a great week!\n\nI'm Rhys, an indie developer (and fellow gamer) who just launched a free app called MeepleUp. I've always been a fan of the 'Beer, Boards, and Bites' vibe you guys have—it's exactly the kind of atmosphere I had in mind when I started coding this.\n\nMeepleUp is designed to help groups get to the table faster. It handles the RSVPs and voting, and since you guys have such a massive library, our remote-browsing feature is a great way for your regulars to pick a game before they even order their first round.\n\nI've spent over a thousand hours on this as a solo project. If you're curious, you can see the details at https://meepleup.com. It would mean a lot to get this into the hands of the KC community!\n\nBest, Rhys Smoker"},
  rerolltavern:{body:"Hey ReRoll team, hope things are going great in the tavern today!\n\nI'm a developer and a total tabletop nerd who just launched a free app called MeepleUp. I love the immersive fantasy vibe you guys have built—it's awesome to see a place where 'D&D character talk' is the standard conversation starter.\n\nI built this app to help groups coordinate their 'adventures'—it handles the RSVPs, game voting, and group chats so people don't have to scramble on Discord. I've put a lot of heart into this as a solo dev, and I'm just trying to get it out to communities that really value the social side of gaming.\n\nIf you have a second to look at https://meepleup.com, I'd value any feedback from your regulars.\n\nCheers, Rhys"},
  tabletopgamehobby:{body:"Hi TableTop Game and Hobby team, hope you're having a busy week in the shop!\n\nI'm an indie dev who recently finished a free app called MeepleUp. I know you guys are a massive pillar of the KC scene, especially with your 'classes' and painting workshops.\n\nI built this tool to help local players find each other and organize their nights in your free game room without the mess of a thousand text threads. It handles RSVPs and player-matching, and I think it would be a great resource for the folks who frequent your weekly events.\n\nI've spent over a thousand hours building this as a labor of love. You can find us at https://meepleup.com.\n\nSincerely, Rhys"},
  "missionboardgames-mission":{body:"Hello Mission: Board Games team, I hope both the Mission and North KC shops are doing great!\n\nI'm an indie developer who just released MeepleUp, a free mobile app for tabletop coordination. It handles everything from RSVP management to remote library browsing. I think the folks who attend your regular weekend gaming events would really appreciate a dedicated interface for staying connected between sessions.\n\nI'm just a solo dev trying to build something useful for the hobby we all love. If you have a second to check out the landing page at https://meepleup.com, I'd love to know what you think.\n\nBest, Rhys Smoker"},

var VENUE_MESSAGES_SET_TWO={
  "asgardgames":{body:"Hi there, hope the Asgard is well-defended and the games are good.\n\nWould you give MeepleUp a try with your regulars? It's a free app I built for groups that game together regularly — members RSVP between sessions, nominate games from a shared library, and vote — so they arrive knowing what they're playing instead of figuring it out after they sit down. If Asgard Games is on BoardGameGeek the library syncs in one shot — or AI photo recognition can read the shelves directly.\n\nOver a thousand hours in and I'm in early release — which means I'm probably still sitting on bugs I don't know about. If you hit one, please email contact@meepleup.com before leaving a review. Much better for both of us if I can fix it first. If it works well, a rating on either app store would go a long way.\n\nmeepleup.com or search \"MeepleUp\" on the App Store / Google Play.\n\nThanks,\nRhys Smoker"},

};
function getCities(){
  if(ACTIVE_SET==="3")return CITIES_SET_THREE;
  return ACTIVE_SET==="2"?CITIES_SET_TWO:CITIES_SET_ONE;
}
function getVenueMessages(){
  if(ACTIVE_SET==="3")return VENUE_MESSAGES_SET_THREE;
  return ACTIVE_SET==="2"?VENUE_MESSAGES_SET_TWO:VENUE_MESSAGES_SET_ONE;
}
/** City set three: hide venues with no email (dataset or saved) and no Facebook URL. */
function venueHasEmailOrFacebook(v){
  var em=(CE[v.id]||(v.email||"")).trim();
  var fb=(v.facebook||"").trim();
  return em.length>0||fb.length>0;
}
function venuesListForCity(c){
  if(ACTIVE_SET!=="3")return{cafes:c.cafes||null,stores:c.stores||null};
  var cf=[],sf=[],i;
  if(c.cafes)for(i=0;i<c.cafes.length;i++)if(venueHasEmailOrFacebook(c.cafes[i]))cf.push(c.cafes[i]);
  if(c.stores)for(i=0;i<c.stores.length;i++)if(venueHasEmailOrFacebook(c.stores[i]))sf.push(c.stores[i]);
  return{cafes:cf.length?cf:null,stores:sf.length?sf:null};
}
/** When opening a venue site, also open a Google tab: site:that-domain "Contact Us" (browsers block in-page find on other sites). Set false to only open the venue. */
var OPEN_GOOGLE_CONTACT_SITE_SEARCH=true;
var venueToastTimer=null;
function SK(v,f){return v+"__"+f;}
function gS(v,f){return S[SK(v,f)]||{checked:false,date:"",note:""};}
function persist(){
  try{
    localStorage.setItem("bgv_state",JSON.stringify({
      activeSet:ACTIVE_SET,
      sets:{
        "1":{s:SET_STATE["1"].s,ce:SET_STATE["1"].ce,tpl:SET_STATE["1"].tpl},
        "2":{s:SET_STATE["2"].s,ce:SET_STATE["2"].ce,tpl:SET_STATE["2"].tpl},
        "3":{s:SET_STATE["3"].s,ce:SET_STATE["3"].ce,tpl:SET_STATE["3"].tpl}
      }
    }));
  }catch(e){}
}
function sS(v,f,u){var o=gS(v,f);S[SK(v,f)]={checked:u.checked!==undefined?u.checked:o.checked,date:u.date!==undefined?u.date:o.date,note:u.note!==undefined?u.note:o.note};persist();}
function today(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function getComposeSubjectBody(vid){
  var custom=vid&&getVenueMessages()[vid];
  if(custom){
    return{subject:(custom.subject||DEFAULT_SUBJECT).trim(),body:(custom.body||"").trim()};
  }
  var p=document.getElementById("tplPanel"),sub,bod;
  if(p&&p.classList.contains("open")){var se=document.getElementById("tplSub"),be=document.getElementById("tplBody");sub=se?se.value:"";bod=be?be.value:"";}
  else{sub=TPL.subject||"";bod=TPL.body||"";}
  return{subject:(sub||"").trim(),body:(bod||"").trim()};
}
function isIOSDevice(){
  return /iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
}
function isAndroid(){return /Android/i.test(navigator.userAgent);}
function mailtoComposeUrl(email,vid){
  var t=getComposeSubjectBody(vid),q=[];
  if(t.subject)q.push("subject="+encodeURIComponent(t.subject));
  if(t.body)q.push("body="+encodeURIComponent(t.body));
  return "mailto:"+email+(q.length?"?"+q.join("&"):"");
}
/** Desktop Gmail web: tf=cm + /u/0/ */
function gmailWebComposeUrl(email,vid){
  var t=getComposeSubjectBody(vid);
  var u="https://mail.google.com/mail/u/0/?to="+encodeURIComponent(email);
  if(t.subject)u+="&su="+encodeURIComponent(t.subject);
  if(t.body)u+="&body="+encodeURIComponent(t.body);
  u+="&tf=cm";
  return u;
}
/** Gmail iOS app — avoids universal-link handoff from https:// that strips compose params. */
function googlegmailComposeUrl(email,vid){
  var t=getComposeSubjectBody(vid);
  var u="googlegmail://co?to="+encodeURIComponent(email);
  if(t.subject)u+="&subject="+encodeURIComponent(t.subject);
  if(t.body)u+="&body="+encodeURIComponent(t.body);
  return u;
}
function openVenueEmail(email,vid){
  if(!email)return;
  markContactLinkOpened(vid,"email");
  if(isIOSDevice()){
    var a=document.createElement("a");
    a.href=googlegmailComposeUrl(email,vid);
    a.rel="noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    return;
  }
  if(isAndroid()){
    var am=document.createElement("a");
    am.href=mailtoComposeUrl(email,vid);
    am.rel="noopener noreferrer";
    document.body.appendChild(am);
    am.click();
    document.body.removeChild(am);
    return;
  }
  window.open(gmailWebComposeUrl(email,vid),"_blank","noopener,noreferrer");
}
function openVenueEmailForVenue(vid){var v=getVenue(vid),email=CE[vid]||(v?v.email:"")||"";openVenueEmail(email,vid);}

/** Turn facebook.com/... path into Messenger deep link (m.me). Handles /p/Page-Name-ID pages. */
function facebookPathToMMeUrl(facebookPath){
  if(!facebookPath)return "";
  var s=String(facebookPath).trim();
  if(!s)return "";
  s=s.replace(/^https?:\/\//i,"").replace(/^www\./i,"");
  if(s.indexOf("facebook.com/")===0)s=s.slice(13);
  else if(s.indexOf("fb.com/")===0)s=s.slice(7);
  s=s.replace(/\/+$/,"");
  if(!s)return "";
  var pm=s.match(/^p\/[^\/]+-(\d{10,})$/i);
  if(pm)return "https://m.me/"+pm[1];
  if(/^\d+$/.test(s))return "https://m.me/"+s;
  var first=s.split("/")[0];
  if(first)return "https://m.me/"+encodeURIComponent(first);
  return "";
}
function openVenueFacebook(mMeUrl,vid){
  if(!mMeUrl)return;
  markContactLinkOpened(vid,"facebook");
  var text=getComposeSubjectBody(vid).body;
  function afterCopy(){
    window.open(mMeUrl,"_blank","noopener,noreferrer");
    showVenueToast("Template body copied — paste into Messenger after the chat opens.");
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(afterCopy).catch(function(){fallbackCopyText(text,afterCopy);});
  }else{fallbackCopyText(text,afterCopy);}
}
function openVenueFacebookForVenue(vid){
  var v=getVenue(vid),fb=v&&v.facebook?String(v.facebook).trim():"";
  if(!fb)return;
  var u=facebookPathToMMeUrl(fb);
  if(!u)return;
  openVenueFacebook(u,vid);
}

function escHtml(str){
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function showVenueToast(msg){
  var el=document.getElementById("venue-toast");if(!el)return;
  el.textContent=msg;el.className="show";
  if(venueToastTimer)clearTimeout(venueToastTimer);
  venueToastTimer=setTimeout(function(){el.className="";el.textContent="";venueToastTimer=null;},3200);
}
function fallbackCopyText(text,cb){
  var ta=document.createElement("textarea");
  ta.value=text;ta.setAttribute("readonly","");ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,text.length);
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
  if(cb)cb();
}
function openVenueWebsite(e,a,vid){
  if(e)e.preventDefault();
  var href=a&&a.href;if(!href)return false;
  var text=getComposeSubjectBody(vid).body;
  function afterCopy(){
    window.open(href,"_blank","noopener,noreferrer");
    if(OPEN_GOOGLE_CONTACT_SITE_SEARCH){
      try{
        var u=new URL(href),host=u.hostname;
        if(host){
          var q="site:"+host+" Contact Us";
          window.open("https://www.google.com/search?q="+encodeURIComponent(q),"_blank","noopener,noreferrer");
        }
      }catch(err){}
    }
    showVenueToast("Template body copied — paste into the contact form. Venue opened"+(OPEN_GOOGLE_CONTACT_SITE_SEARCH?" — also opened Google search for Contact Us on that site.":".")+"");
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(afterCopy).catch(function(){fallbackCopyText(text,afterCopy);});
  }else{fallbackCopyText(text,afterCopy);}
  return false;
}

/** Copy saved key/values onto dst without removing existing keys on dst (additive upgrades: new venues need no row in storage). */
function mergeRecord(dst,src){
  if(!src||typeof src!=="object")return;
  for(var k in src){
    if(Object.prototype.hasOwnProperty.call(src,k))dst[k]=src[k];
  }
}
function loadState(){
  try{
    var raw=localStorage.getItem("bgv_state");
    if(raw){
      var emb=JSON.parse(raw);
      if(emb.sets){
        if(emb.activeSet==="1"||emb.activeSet==="2"||emb.activeSet==="3")ACTIVE_SET=emb.activeSet;
        function mergeSet(k){
          var b=emb.sets[k];if(!b)return;
          if(b.s)mergeRecord(SET_STATE[k].s,b.s);
          if(b.ce)mergeRecord(SET_STATE[k].ce,b.ce);
          if(b.tpl){
            SET_STATE[k].tpl.subject=b.tpl.subject!=null?b.tpl.subject:DEFAULT_SUBJECT;
            SET_STATE[k].tpl.body=b.tpl.body!=null?b.tpl.body:DEFAULT_BODY;
          }
        }
        mergeSet("1");mergeSet("2");mergeSet("3");
      }else{
        if(emb.s)mergeRecord(SET_STATE["1"].s,emb.s);
        if(emb.ce)mergeRecord(SET_STATE["1"].ce,emb.ce);
        if(emb.tpl){
          SET_STATE["1"].tpl.subject=emb.tpl.subject!=null?emb.tpl.subject:DEFAULT_SUBJECT;
          SET_STATE["1"].tpl.body=emb.tpl.body!=null?emb.tpl.body:DEFAULT_BODY;
        }
      }
    }
  }catch(e){}
  applyActiveBucket();
}

function allVenues(){var out=[],C=getCities();for(var i=0;i<C.length;i++){var c=C[i],vl=venuesListForCity(c);if(vl.cafes)for(var j=0;j<vl.cafes.length;j++)out.push(vl.cafes[j]);if(vl.stores)for(var j=0;j<vl.stores.length;j++)out.push(vl.stores[j]);}return out;}
function isDone(vid){var fs=["phone","email","website","facebook"];for(var i=0;i<fs.length;i++)if(gS(vid,fs[i]).checked)return true;return false;}
function isSkipped(vid){return gS(vid,"skip").checked;}
function isFresh(vid){return !isDone(vid)&&!isSkipped(vid);}

function updateUI(){
  var all=allVenues(),done=0,skip=0;
  for(var i=0;i<all.length;i++){if(isDone(all[i].id))done++;else if(isSkipped(all[i].id))skip++;}
  var left=all.length-done-skip;
  document.getElementById("s-total").innerHTML="<em>"+all.length+"</em> venues";
  document.getElementById("s-done").innerHTML="<em>"+done+"</em> contacted";
  document.getElementById("s-skip").innerHTML="<em>"+skip+"</em> skipped";
  document.getElementById("s-left").innerHTML="<em>"+left+"</em> remaining";
  var Ci=getCities();
  for(var i=0;i<Ci.length;i++){
    var c=Ci[i],vl=venuesListForCity(c),arr=[],d=0,s=0;
    if(vl.cafes)arr=arr.concat(vl.cafes);if(vl.stores)arr=arr.concat(vl.stores);
    for(var j=0;j<arr.length;j++){if(isDone(arr[j].id))d++;else if(isSkipped(arr[j].id))s++;}
    var pct=arr.length?Math.round((d+s)/arr.length*100):0;
    var pb=document.getElementById("pb_"+c.id);if(pb)pb.style.width=pct+"%";
  }
  for(var i=0;i<all.length;i++){
    var el=document.getElementById("vc_"+all[i].id);if(!el)continue;
    el.className="vc"+(isDone(all[i].id)&&!isSkipped(all[i].id)?" is-done":isSkipped(all[i].id)?" is-skip":"");
  }
  buildIdx();
  var gone=(left===0);
  document.getElementById("all-done").style.display=gone?"flex":"none";
  document.getElementById("fab").style.display=gone?"none":"";
}

function buildIdx(){
  var html="",C=getCities();
  for(var i=0;i<C.length;i++){
    var c=C[i],vl=venuesListForCity(c),arr=[],d=0,s=0;
    if(vl.cafes)arr=arr.concat(vl.cafes);if(vl.stores)arr=arr.concat(vl.stores);
    if(!arr.length)continue;
    for(var j=0;j<arr.length;j++){if(isDone(arr[j].id))d++;else if(isSkipped(arr[j].id))s++;}
    var tot=arr.length,allDone=(d+s===tot&&tot>0),partial=(d+s>0&&!allDone);
    var cls=allDone?"done":partial?"partial":"";
    var badge=allDone?" v":partial?" "+(d+s)+"/"+tot:"";
    html+="<button class='ibtn "+cls+"' onclick=\"jumpTo('city_"+c.id+"')\">"+c.name.split(",")[0]+badge+"</button>";
  }
  document.getElementById("idx-links").innerHTML=html;
}
function jumpTo(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}
function scrollToNext(skipVid){
  var all=allVenues();
  for(var i=0;i<all.length;i++){
    var id=all[i].id;
    if(skipVid&&id===skipVid)continue;
    if(isFresh(id)){
      var el=document.getElementById("vc_"+id);
      if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="3px solid #c26a00";setTimeout(function(e){e.style.outline="";}.bind(null,el),1400);}
      return;
    }
  }
}

function markContactLinkOpened(vid,field){
  if(field!=="email"&&field!=="facebook")return;
  var o=gS(vid,field);
  if(o.checked)return;
  sS(vid,field,{checked:true,date:today(),note:o.note});
  if(field==="email"){var er=document.getElementById("erow_"+vid);if(er)er.innerHTML=buildEmailMain(vid);}
  else{var fr=document.getElementById("frow_"+vid);if(fr)fr.innerHTML=buildFacebookMain(vid);}
  var nw=document.getElementById("note_"+vid+"_"+field);if(nw)nw.className="crow-note open";
  updateUI();
  setTimeout(function(){scrollToNext(vid);},160);
}
function clearEmailFacebookOpened(vid,field){
  if(field!=="email"&&field!=="facebook")return;
  var o=gS(vid,field);
  if(!o.checked)return;
  sS(vid,field,{checked:false,date:"",note:o.note});
  if(field==="email"){var er=document.getElementById("erow_"+vid);if(er)er.innerHTML=buildEmailMain(vid);}
  else{var fr=document.getElementById("frow_"+vid);if(fr)fr.innerHTML=buildFacebookMain(vid);}
  var nw=document.getElementById("note_"+vid+"_"+field);if(nw)nw.className="crow-note";
}
function toggle(vid,field){
  var chk=document.getElementById("chk_"+vid+"_"+field);if(!chk)return;
  var isChk=chk.checked,d=isChk?today():"";
  sS(vid,field,{checked:isChk,date:d});
  var nw=document.getElementById("note_"+vid+"_"+field);if(nw)nw.className="crow-note"+(isChk?" open":"");
  var dt=document.getElementById("dt_"+vid+"_"+field);if(dt){dt.textContent=d;dt.style.display=isChk?"":"none";}
  if(field==="skip"&&isChk){
    var fs=["phone","email","website","facebook"];
    for(var i=0;i<fs.length;i++){
      var f=fs[i],c2=document.getElementById("chk_"+vid+"_"+f);
      if(c2&&c2.checked){c2.checked=false;sS(vid,f,{checked:false,date:"",note:gS(vid,f).note});var n2=document.getElementById("note_"+vid+"_"+f);if(n2)n2.className="crow-note";var d2=document.getElementById("dt_"+vid+"_"+f);if(d2){d2.textContent="";d2.style.display="none";}}
      else if((f==="email"||f==="facebook")&&gS(vid,f).checked)clearEmailFacebookOpened(vid,f);
    }
  }
  if(field!=="skip"&&isChk){var sc=document.getElementById("chk_"+vid+"_skip");if(sc&&sc.checked){sc.checked=false;sS(vid,"skip",{checked:false,date:""});var ns=document.getElementById("note_"+vid+"_skip");if(ns)ns.className="crow-note";var ds=document.getElementById("dt_"+vid+"_skip");if(ds){ds.textContent="";ds.style.display="none";}}}
  updateUI();
}
function saveNote(vid,field,val){sS(vid,field,{note:val});}

function toggleEmailAdd(vid){var w=document.getElementById("eadd_"+vid);if(!w)return;var op=!w.classList.contains("open");w.className="eadd-wrap"+(op?" open":"");if(op){var inp=document.getElementById("eadd_inp_"+vid);if(inp)setTimeout(function(){inp.focus();},50);}}
function saveCustomEmail(vid){var inp=document.getElementById("eadd_inp_"+vid);if(!inp)return;var val=inp.value.trim();if(!val)return;CE[vid]=val;persist();var row=document.getElementById("erow_"+vid);if(row)row.innerHTML=buildEmailMain(vid);var w=document.getElementById("eadd_"+vid);if(w)w.className="eadd-wrap";}
function getVenue(vid){var all=allVenues();for(var i=0;i<all.length;i++)if(all[i].id===vid)return all[i];return null;}

function buildEmailMain(vid){
  var v=getVenue(vid),email=CE[vid]||(v?v.email:"")||"",s=gS(vid,"email");
  var dtStyle=s.checked&&s.date?"":"display:none";
  var linkCls="crow-link crow-link-email"+(s.checked?" crow-link-visited":"");
  var valHtml=email
    ? "<span class='crow-val crow-val-link'><a class='"+linkCls+"' href='#' onclick=\"event.preventDefault();openVenueEmailForVenue('"+vid+"')\">&#9993; "+email+"</a></span>"
    : "<span class='crow-val na'>"+(v&&v.emailNote?v.emailNote:"No email found")+"</span>";
  return "<span class='crow-chk-spacer' aria-hidden='true'></span>"
    +"<span class='crow-lbl'>Email</span>"+valHtml
    +"<button class='add-email-btn' onclick=\"toggleEmailAdd('"+vid+"')\" title='Add email'>+</button>"
    +"<span class='crow-date' id='dt_"+vid+"_email' style='"+dtStyle+"'>"+s.date+"</span>";
}

function buildFacebookMain(vid){
  var v=getVenue(vid),fb=(v&&v.facebook)?String(v.facebook).trim():"",s=gS(vid,"facebook");
  var dtStyle=s.checked&&s.date?"":"display:none";
  var valHtml;
  if(fb){
    var linkCls="crow-link crow-link-facebook"+(s.checked?" crow-link-visited":"");
    valHtml="<span class='crow-val crow-val-link'><a class='"+linkCls+"' href='#' onclick=\"event.preventDefault();openVenueFacebookForVenue('"+vid+"')\">&#128172; "+escHtml(fb)+"</a></span>";
  }else{
    valHtml="<span class='crow-val na'>"+escHtml((v&&v.facebookNote)?v.facebookNote:"No Facebook page")+"</span>";
  }
  return "<span class='crow-chk-spacer' aria-hidden='true'></span>"
    +"<span class='crow-lbl'>FB Msg</span>"+valHtml
    +"<span class='crow-date' id='dt_"+vid+"_facebook' style='"+dtStyle+"'>"+s.date+"</span>";
}

function buildRow(vid,field,label,value,isLink,linkUrl,fallback){
  var s=gS(vid,field),isSkip=(field==="skip"),hasVal=!!(value&&value.trim());
  var valHtml="";
  if(!hasVal&&fallback){valHtml="<span class='crow-val na'>"+fallback+"</span>";}
  else if(isLink&&hasVal){var href=linkUrl.indexOf("http")===0?linkUrl:"https://"+linkUrl;valHtml="<span class='crow-val crow-val-link'><a class='crow-link crow-link-website' href='"+href+"' rel='noopener noreferrer' onclick=\"return openVenueWebsite(event,this,'"+vid+"')\">&#128279; "+value+"</a></span>";}
  else if(hasVal){valHtml="<span class='crow-val'>"+value+"</span>";}
  else{valHtml="<span class='crow-val'>-</span>";}
  var dtStyle=s.checked&&s.date?"":"display:none";
  var dtCls="crow-date"+(isSkip?" skip-dt":"");
  var chkCls="crow-chk"+(isSkip?" skip-chk":"");
  var rowCls="crow"+(isSkip?" skip-row":"");
  return "<div class='"+rowCls+"'>"
    +"<div class='crow-main'>"
    +"<input type='checkbox' class='"+chkCls+"' id='chk_"+vid+"_"+field+"'"+(s.checked?" checked":"")+" onchange=\"toggle('"+vid+"','"+field+"')\">"
    +"<span class='crow-lbl'>"+label+"</span>"+valHtml
    +"<span class='"+dtCls+"' id='dt_"+vid+"_"+field+"' style='"+dtStyle+"'>"+s.date+"</span>"
    +"</div>"
    +"<div class='crow-note"+(s.checked?" open":"")+"' id='note_"+vid+"_"+field+"'>"
    +"<span class='note-dt'>"+s.date+"</span>"
    +"<textarea class='note-ta' placeholder='Add note...' oninput=\"saveNote('"+vid+"','"+field+"',this.value)\">"+s.note+"</textarea>"
    +"</div></div>";
}

function buildVenue(v,type){
  var pillCls=type==="cafe"?"pill-cafe":"pill-store";
  var pillLbl=type==="cafe"?"Cafe":"Store";
  var webUrl=v.website?(v.website.indexOf("http")===0?v.website:"https://"+v.website):"";
  var eS=gS(v.id,"email");
  var fbS=gS(v.id,"facebook");
  var doneCls=(isDone(v.id)&&!isSkipped(v.id))?" is-done":isSkipped(v.id)?" is-skip":"";
  return "<div class='vc"+doneCls+"' id='vc_"+v.id+"'>"
    +"<div class='vc-top'>"
    +"<div style='flex:1;min-width:0'><div class='vc-name'>"+v.name+"</div><div class='vc-sub'>"+v.subloc+"</div></div>"
    +"<span class='vc-pill "+pillCls+"'>"+pillLbl+"</span>"
    +"</div><div class='vc-rows'>"
    +buildRow(v.id,"phone","Phone",v.phone||"",false,"",v.phone?"":"No phone found")
    +"<div class='crow'>"
    +"<div class='crow-main' id='erow_"+v.id+"'>"+buildEmailMain(v.id)+"</div>"
    +"<div class='crow-note"+(eS.checked?" open":"")+"' id='note_"+v.id+"_email'>"
    +"<span class='note-dt'>"+eS.date+"</span>"
    +"<textarea class='note-ta' placeholder='Add note...' oninput=\"saveNote('"+v.id+"','email',this.value)\">"+eS.note+"</textarea>"
    +"</div></div>"
    +"<div class='eadd-wrap' id='eadd_"+v.id+"'>"
    +"<input class='eadd-inp' type='email' id='eadd_inp_"+v.id+"' placeholder='Enter email address...' value='"+(CE[v.id]||v.email||"")+"' onkeydown=\"if(event.key==='Enter')saveCustomEmail('"+v.id+"')\">"
    +"<button class='eadd-btn' onclick=\"saveCustomEmail('"+v.id+"')\">Save</button>"
    +"</div>"
    +buildRow(v.id,"website","Website",v.website||"",!!v.website,webUrl,v.emailNote||"No website")
    +"<div class='crow'>"
    +"<div class='crow-main' id='frow_"+v.id+"'>"+buildFacebookMain(v.id)+"</div>"
    +"<div class='crow-note"+(fbS.checked?" open":"")+"' id='note_"+v.id+"_facebook'>"
    +"<span class='note-dt'>"+fbS.date+"</span>"
    +"<textarea class='note-ta' placeholder='Add note...' oninput=\"saveNote('"+v.id+"','facebook',this.value)\">"+fbS.note+"</textarea>"
    +"</div></div>"
    +buildRow(v.id,"skip","Skip","",false,"","Mark to skip this venue")
    +"</div></div>";
}

function buildCity(c){
  var vl=venuesListForCity(c),cafes=vl.cafes,stores=vl.stores;
  var arr=[],d=0,s=0;
  if(cafes)arr=arr.concat(cafes);if(stores)arr=arr.concat(stores);
  if(!arr.length)return"";
  for(var i=0;i<arr.length;i++){if(isDone(arr[i].id))d++;else if(isSkipped(arr[i].id))s++;}
  var pct=arr.length?Math.round((d+s)/arr.length*100):0;
  var tagMap={major:["tag-major","Metro"],college:["tag-college","College"],convention:["tag-conv","Conv."]};
  var tagHtml="";for(var i=0;i<c.tags.length;i++){var t=tagMap[c.tags[i]];if(t)tagHtml+="<span class='tag "+t[0]+"'>"+t[1]+"</span>";}
  var body="";
  if(cafes&&cafes.length){body+="<div class='sub-lbl'>Cafes &amp; Pubs ("+cafes.length+")</div>";for(var i=0;i<cafes.length;i++)body+=buildVenue(cafes[i],"cafe");}
  if(stores&&stores.length){body+="<div class='sub-lbl' style='margin-top:4px'>Stores ("+stores.length+")</div>";for(var i=0;i<stores.length;i++)body+=buildVenue(stores[i],"store");}
  return "<div class='city-sec' id='city_"+c.id+"'>"
    +"<div class='city-top'><div class='city-name'>"+c.name+"</div><div class='city-cnt'>"+arr.length+" venues</div></div>"
    +"<div class='city-tags'>"+tagHtml+"</div>"
    +body
    +"<div class='prog-wrap'><div class='prog-bar' id='pb_"+c.id+"' style='width:"+pct+"%'></div></div>"
    +"</div>";
}

function toggleTpl(){
  var p=document.getElementById("tplPanel"),b=document.getElementById("tplToggle");
  var open=p.classList.toggle("open");
  b.className="hbtn"+(open?" active":"");
  if(open){
    document.getElementById("tplSub").value=TPL.subject;
    document.getElementById("tplBody").value=TPL.body;
  }
}
function saveTpl(){TPL.subject=document.getElementById("tplSub").value;TPL.body=document.getElementById("tplBody").value;persist();var f=document.getElementById("tplFlash");f.style.display="inline";setTimeout(function(){f.style.display="none";},2000);}
function clearTpl(){TPL.subject="";TPL.body="";document.getElementById("tplSub").value="";document.getElementById("tplBody").value="";}
function resetAll(){
  if(!confirm("Reset outreach progress for the current city set only? This cannot be undone."))return;
  for(var k in S)delete S[k];
  for(var k in CE)delete CE[k];
  var c=document.getElementById("container");c.innerHTML="";
  var C=getCities();
  for(var i=0;i<C.length;i++)c.innerHTML+=buildCity(C[i]);
  buildIdx();updateUI();persist();
}
function clearStoredState(){
  if(!confirm("Clear all saved data on this device? Progress, custom emails, and templates for all city sets will be removed. This cannot be undone."))return;
  try{localStorage.removeItem("bgv_state");}catch(e){}
  SET_STATE={
    "1":{s:{},ce:{},tpl:{subject:DEFAULT_SUBJECT,body:DEFAULT_BODY}},
    "2":{s:{},ce:{},tpl:{subject:DEFAULT_SUBJECT,body:DEFAULT_BODY}},
    "3":{s:{},ce:{},tpl:{subject:DEFAULT_SUBJECT,body:DEFAULT_BODY}}
  };
  ACTIVE_SET="1";
  applyActiveBucket();
  var c=document.getElementById("container");c.innerHTML="";
  var C=getCities();
  for(var i=0;i<C.length;i++)c.innerHTML+=buildCity(C[i]);
  buildIdx();updateUI();
  updateCitySetButtons();
  var ts=document.getElementById("tplSub"),tb=document.getElementById("tplBody");
  if(ts)ts.value=TPL.subject;if(tb)tb.value=TPL.body;
  showVenueToast("Storage cleared.");
}
function downloadHTML(){
  // On GitHub Pages we use localStorage — auto-saves on every change
  // This button just confirms to the user that progress is saved
  persist();
  var b=document.getElementById("saveBtn");
  var orig=b.innerHTML;
  b.innerHTML="&#10003; Saved!";
  b.style.color="var(--green)";
  setTimeout(function(){b.innerHTML=orig;b.style.color="";},2000);
}

function updateCitySetButtons(){
  var b1=document.getElementById("citySet1Btn"),b2=document.getElementById("citySet2Btn"),b3=document.getElementById("citySet3Btn");
  if(b1)b1.className="hbtn"+(ACTIVE_SET==="1"?" active":"");
  if(b2)b2.className="hbtn"+(ACTIVE_SET==="2"?" active":"");
  if(b3)b3.className="hbtn"+(ACTIVE_SET==="3"?" active":"");
}
function switchCitySet(id){
  if((id!=="1"&&id!=="2"&&id!=="3")||id===ACTIVE_SET)return;
  ACTIVE_SET=id;
  applyActiveBucket();
  var c=document.getElementById("container");c.innerHTML="";
  var C=getCities();
  for(var i=0;i<C.length;i++)c.innerHTML+=buildCity(C[i]);
  buildIdx();updateUI();persist();
  updateCitySetButtons();
  var p=document.getElementById("tplPanel");
  if(p&&p.classList.contains("open")){
    var ts=document.getElementById("tplSub"),tb=document.getElementById("tplBody");
    if(ts)ts.value=TPL.subject;if(tb)tb.value=TPL.body;
  }
  showVenueToast(ACTIVE_SET==="3"?"City set three":ACTIVE_SET==="2"?"City set two":"City set one");
}

// INIT - runs immediately, no DOMContentLoaded needed since script is at end of body
loadState();
persist();
updateCitySetButtons();
var container=document.getElementById("container");
var html="",Ci=getCities();
for(var i=0;i<Ci.length;i++)html+=buildCity(Ci[i]);
container.innerHTML=html;
buildIdx();
updateUI();
setTimeout(scrollToNext,400);
</script>
